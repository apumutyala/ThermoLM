[project]
name = "thrml"
version = "0.1.4"
description = "Thermodynamic HypergRaphical Model Library (THRML)"
readme = "README.md"
requires-python = ">=3.10"
authors = [
  {name = "Extropic AI"},
]
urls = { repository = "https://github.com/extropic-ai/thrml" }

dependencies = [
    "equinox>=0.11.2",
    "jaxtyping>=0.2.23",
]

[build-system]
requires = ["setuptools>=65"]
build-backend = "setuptools.build_meta"

[project.optional-dependencies]
examples = [
    "jupyter>=1.0",
    "matplotlib>=3.7.1",
    "networkx>=2.6.3",
    "dwave_networkx>=0.8.0",
    "scikit-learn>=1.7.0",
]
testing = [
    "coverage==7.3.2",
    "pytest==7.2.0",
    "nbmake>=1.5.5",
    "networkx>=2.6.3",
    "optax>=0.2.4"
]
development = [
    "black==25.1.0",
    "isort==5.12.0",
    "pyright==1.1.399",
    "mypy==1.5.1",
    "pytest-cov==4.0.0",
    "pytest-asyncio==0.21.0",
    "black[jupyter]==25.1.0"
]
docs = [
  "nbformat>=5.9",
  "nbconvert>=7.0"
]

[tool.setuptools]
packages = { find = { include = ["thrml", "thrml.*"] } }

[tool.isort]
profile = "black"
line_length = 120

[tool.black]
line-length = 120

[tool.pyright]
reportUnnecessaryTypeIgnoreComment = true
include = ["thrml", "docs_site/scripts"]
# The docs renderer lives under docs_site/scripts as the importable
# ``thrml_render`` package; add it to the search path so its intra-package
# imports resolve when pyright type-checks the renderer.
extraPaths = ["docs_site/scripts"]

[tool.pytest.ini_options]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
]