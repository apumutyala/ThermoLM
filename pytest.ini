[pytest]
# Pytest configuration for ThermoLM JAX

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
# tests/experimental holds legacy shape-only tests for the UNVALIDATED
# energy-diffusion LM track (see STATUS.md); they are not collected by default.
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --ignore=tests/experimental

# Markers
markers =
    unit: Unit tests (fast, test components in isolation)
    integration: Integration tests (test component interactions)
    benchmark: Benchmark tests (performance profiling)
    slow: Slow running tests (run with -m slow)

# Coverage
# Uncomment to enable coverage reporting
# addopts = --cov=thermolm_jax --cov-report=html --cov-report=term-missing

# Minimum coverage
# coverage: 90 for unit tests
# coverage: 80 for integration tests
